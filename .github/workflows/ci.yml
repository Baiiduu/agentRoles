name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project and pre-commit
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall src tests run_backend.py run_demo_mcp_server.py run_frontend.py run_web_console.py

      - name: Run stable backend smoke tests
        run: python -m unittest tests.unit.test_agent_registry tests.unit.test_memory_services tests.unit.test_tool_layer tests.unit.test_observability_queries tests.unit.test_domain_agent_executor

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/workspace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/workspace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
