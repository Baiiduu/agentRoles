name: Feature Request
description: 提出新功能、产品能力或架构增强需求
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        这个模板适用于新增功能、较大增强、平台能力扩展。
  - type: input
    id: summary
    attributes:
      label: 需求摘要
      description: 用一句话说明想新增什么能力
      placeholder: 例如：支持为不同 domain pack 配置独立的 agent review policy
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 当前痛点是什么？为什么需要这项功能？
      placeholder: |
        例如：
        - 当前所有 review 规则混在一起
        - 难以针对教育域与供应链域实施不同约束
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标与预期收益
      description: 这项功能完成后，用户或团队会获得什么价值？
      placeholder: |
        例如：
        - 降低人工 review 负担
        - 让 agent 行为配置更标准化
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 明确包含什么，不包含什么
      placeholder: |
        包含：
        - ...
        
        不包含：
        - ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案草案
      description: 如果你已有方案想法，可直接写在这里
      placeholder: |
        例如：
        - 新增配置模型
        - 更新 Web Console 页面
        - 补充运行时校验
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: 风险与依赖
      description: 是否依赖其他模块？是否存在上线或兼容性风险？
      placeholder: |
        例如：
        - 依赖 agent registry 元数据补充
        - 可能影响现有 capability 数据结构
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 建议写成可验证的条目
      placeholder: |
        例如：
        - [ ] UI 可配置
        - [ ] 后端可持久化
        - [ ] 补充单元测试
        - [ ] 相关文档更新
    validations:
      required: true
